name: Protocol proposal
description: Propose a governance or conformance change
title: "[Proposal]: "
labels: ["proposal"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What governance problem is not addressed?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
    validations:
      required: true
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility and security impact
    validations:
      required: true
